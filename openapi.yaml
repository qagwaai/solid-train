                  transactionId: tx-123
                  playerName: MarketPilot
                  characterId: character-1
                  sessionKey: session-123
                  marketId: sol-ceres-exchange
                  solarSystemId: sol
                  itemId: iridium
                  quantity: 1
      responses:
