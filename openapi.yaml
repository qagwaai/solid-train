openapi: 3.0.3
info:
  title: Stellar API and Message Contract
  version: 2.0.0
  description: >
    Machine-readable contract for HTTP endpoints and Socket.IO message payloads.
    Socket operations are modeled as virtual POST operations under /socket/* so the
    contract can be consumed by tooling that expects OpenAPI.
servers:
  - url: http://localhost:3000
tags:
  - name: Utility
  - name: Items
  - name: Auth
  - name: Character
  - name: Ship
  - name: Mission
  - name: Celestial
  - name: Market
  - name: Context
  - name: SolarSystem
  - name: Stars
  - name: Ledger
  - name: Game
  - name: Realtime
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [Utility]
      responses:
        '200':
          description: Health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /items:
    get:
      summary: Get canonical item list
      operationId: getItems
      tags: [Items]
      responses:
        '200':
          description: Canonical item list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Item'
                example:
                  items:
                    - itemType: hull-patch-kit
                      displayName: Hull Patch Kit
                      description: Structural repair kit for hull breach patching and restoring ship integrity. Required for the Scavenger Pod repair mission step.
                      category: Repair
                      tier: 1
                      rarity: Common
                      launchable: false
                      state: contained
                      damageStatus: intact
                      requiredMaterials:
                        - material: Iron
                          quantity: 1
                          acceptedItemTypes:
                            - iron
                            - iron-ore
                            - iron-raw-material

