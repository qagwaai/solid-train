name: SW-08 Contract Safety Gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  contract-safety-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files for SW-08 PR hygiene
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
          mkdir -p artifacts/contracts
          git diff --name-only "origin/${{ github.base_ref }}"...HEAD > artifacts/contracts/sw08-changed-files.txt

      - name: Enforce SW-08 producer checklist and migration note
        if: github.event_name == 'pull_request'
        env:
          SW08_PR_BODY: ${{ github.event.pull_request.body }}
        run: npm run contract:pr:hygiene

      - name: Generate deterministic contract artifact
        run: npm run contract:artifact

      - name: Run Stage 3 validation suite
        run: node --test test/sw08-contract-stage3.test.js

      - name: Run PR hard-fail drift detection
        if: github.event_name == 'pull_request'
        run: npm run contract:gate:hard

      - name: Run SW-01 Forge mission-status hard gate
        if: github.event_name == 'pull_request'
        run: npm run contract:gate:sw01:forge

      - name: Run SW-01 Nova preflight hard gate
        if: github.event_name == 'pull_request'
        run: npm run contract:preflight:sw01:nova

      - name: Run SW-13 Forge descriptor hard gate
        if: github.event_name == 'pull_request'
        run: npm run contract:gate:sw13:forge

      - name: Run SW-13 Nova preflight hard gate
        if: github.event_name == 'pull_request'
        run: npm run contract:preflight:sw13:nova

      - name: Run main-branch report-only drift detection
        if: github.event_name == 'push'
        run: npm run contract:drift

      - name: Run recurrence trend guardrail
        if: github.event_name == 'push'
        run: npm run contract:metrics:trend:strict

      - name: Upload SW-08 diagnostics
        if: always()
        uses: actions/upload-artifact@834a144ee995460fba8ed112a2fc961b36a5ec5a # v4.3.6
        with:
          name: sw08-contract-safety-gate-report
          path: |
            artifacts/contracts/contract-artifact.json
            artifacts/contracts/drift-report.json
            artifacts/contracts/drift-fixture-report.json
            artifacts/contracts/stage3-hard-fail-report.json
            artifacts/contracts/stage3-approved-report.json
            artifacts/contracts/stage3-expired-report.json
            artifacts/contracts/stage3-missing-approval-report.json
            artifacts/contracts/stage3-compat-report.json
            artifacts/contracts/sw01-m4-nova-preflight-report.json
            artifacts/contracts/sw01-m4-forge-pass-report.json
            artifacts/contracts/sw01-m4-forge-drift-enum-report.json
            artifacts/contracts/sw01-m4-forge-drift-unsupported-status-report.json
            artifacts/contracts/sw01-m4-forge-drift-shape-report.json
            artifacts/contracts/sw01-m3-alignment-report.json
            artifacts/contracts/sw01-m3-drift-enum-report.json
            artifacts/contracts/sw01-m3-drift-unsupported-status-report.json
            artifacts/contracts/sw01-m3-drift-shape-report.json
            artifacts/contracts/sw13-m4-nova-preflight-report.json
            artifacts/contracts/sw13-m4-forge-pass-report.json
            artifacts/contracts/sw13-m4-forge-drift-enum-report.json
            artifacts/contracts/sw13-m4-forge-drift-unsupported-domain-report.json
            artifacts/contracts/sw13-m4-forge-drift-shape-report.json
            artifacts/contracts/sw13-m3-alignment-report.json
            artifacts/contracts/sw13-m3-drift-enum-report.json
            artifacts/contracts/sw13-m3-drift-unsupported-domain-report.json
            artifacts/contracts/sw13-m3-drift-shape-report.json
            artifacts/contracts/sw08-trend-report.json
          if-no-files-found: error
