name: Security Hardening Gate

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  secrets-dependencies-contract:
    name: Secrets, Dependencies, and Contract Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Run secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate lockfile policy
        run: |
          test -f package-lock.json
          npm ci --ignore-scripts

      - name: Run dependency vulnerability gate (high/critical)
        run: npm run security:audit

      - name: Contract security assertions (Stage 3)
        run: node --test test/sw08-contract-stage3.test.js

      - name: Contract hardening assertions (SW-01 and SW-13)
        run: |
          npm run contract:lint:item-types
          npm run contract:lint:mission-status
          npm run contract:lint:sw13-descriptor

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fc7e4a0fa01c3cca5fd6a1fddec5c0740c977aa2 # v3.28.14
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@fc7e4a0fa01c3cca5fd6a1fddec5c0740c977aa2 # v3.28.14

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
