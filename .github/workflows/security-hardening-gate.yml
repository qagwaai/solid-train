name: Security Hardening Gate

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 4 * * 1'

permissions:
  contents: read

jobs:
  secrets-dependencies-contract:
    name: Secrets, Dependencies, and Contract Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Run secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate lockfile policy
        run: |
          test -f package-lock.json
          npm ci --ignore-scripts

      - name: Run dependency vulnerability gate (high/critical)
        run: npm run security:audit

      - name: Contract security assertions (Stage 3)
        run: node --test test/sw08-contract-stage3.test.js

      - name: Contract hardening assertions (SW-01 and SW-13)
        run: |
          npm run contract:lint:item-types
          npm run contract:lint:mission-status
          npm run contract:lint:sw13-descriptor

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14

      - name: Analyze
        uses: github/codeql-action/analyze@4d6150cc15f4cf6b68f0c4cff5ec0f020ad4bf5b # v3.28.14
